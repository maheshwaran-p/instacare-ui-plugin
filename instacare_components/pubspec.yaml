name: instacare_components
description: Instacare UI component library
version: 1.1.1
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"
dependencies:
  flutter:
    sdk: flutter
  country_flags: ^2.2.0
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  assets:
    - lib/src/assessts_patient/
  plugin:
    platforms:
      android:
        package: com.example.instacare_components
        pluginClass: InstacareComponentsPlugin
      ios:
        pluginClass: InstacareComponentsPlugin
      macos:
        pluginClass: InstacareComponentsPlugin
